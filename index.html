<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

<body>

<div class="darkness"></div>

<canvas id="spellCanvas"></canvas>

<div id="particles"></div>
<div id="candles"></div>

<div class="book-wrapper">

<div id="book">

<div class="page cover">
<h1 class="magic-text">The Living Spellbook</h1>
<p class="magic-text">Draw spells with your wand</p>
</div>

<div class="page">
<h2 class="magic-text">Gesture Magic</h2>
<p class="magic-text">
Try drawing shapes with your wand:
<br><br>
— Line → Lumos  
<br>
— Circle → Patronus  
<br>
— Z shape → Alohomora
</p>
</div>

<div class="page cover">
<h2 class="magic-text">The Book Awaits Your Magic</h2>
</div>

</div>

</div>
