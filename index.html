<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>The Living Spellbook</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>

</head>

<body>

<div class="darkness"></div>

<div id="particles"></div>

<div class="book-wrapper">

<div id="book">

<div class="page cover">
<h1>The Living Spellbook</h1>
<p>Move your wand to reveal magic</p>
</div>

<div class="page">
<h2>Lumos</h2>
<p>The spell that brings light to darkness.</p>
<button class="spell" data-spell="lumos">Cast Lumos</button>
</div>

<div class="page">
<h2>Accio</h2>
<p>The summoning charm.</p>
<button class="spell" data-spell="accio">Cast Accio</button>
</div>

<div class="page">
<h2>Alohomora</h2>
<p>The unlocking charm.</p>
<button class="spell" data-spell="alohomora">Cast Alohomora</button>
</div>

<div class="page">
<h2>Expecto Patronum</h2>
<p>A powerful defensive charm.</p>
<button class="spell" data-spell="patronum">Cast Patronus</button>
</div>

<div class="page cover">
<h2>End of the Spellbook</h2>
</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
