<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Living Spellbook</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:serif;
overflow:hidden;
}

/* wand light */

#light{

position:fixed;

width:300px;
height:300px;

border-radius:50%;

pointer-events:none;

background:radial-gradient(circle, rgba(255,240,180,.9), rgba(0,0,0,0));

mix-blend-mode:screen;

}

.container{

display:flex;
height:100vh;
justify-content:center;
align-items:center;

}

.book{

font-size:40px;
cursor:pointer;
padding:40px;

background:#2b1d0e;

border:4px solid #6b4c1f;

border-radius:8px;

}

</style>

</head>

<body>

<div id="light"></div>

<div class="container">

<div class="book" onclick="openMap()">
📜 Open The Marauder's Map
</div>

</div>

<script>

const light=document.getElementById("light")

document.addEventListener("mousemove",e=>{

light.style.left=e.clientX-150+"px"
light.style.top=e.clientY-150+"px"

})

function openMap(){

window.location="marauders-map.html"

}

</script>

</body>
</html>
