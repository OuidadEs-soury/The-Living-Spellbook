<script>

const light=document.getElementById("light")

/* wand light */

document.addEventListener("mousemove",e=>{

light.style.left=e.clientX-150+"px"
light.style.top=e.clientY-150+"px"

})

/* open map */

function openMap(){

window.location="marauders-map.html"

}

/* VOICE MAGIC */

const SpeechRecognition =
window.SpeechRecognition || window.webkitSpeechRecognition

const recognition = new SpeechRecognition()

recognition.continuous=true
recognition.lang="en-US"

recognition.start()

recognition.onresult = function(event){

let transcript = event.results[event.results.length-1][0].transcript
.toLowerCase()

console.log("Spell heard:", transcript)

/* spells */

if(transcript.includes("reveal the marauders map") ||
transcript.includes("reveal the marauder's map")){

openMap()

}

if(transcript.includes("lumos")){

light.style.display="block"

}

if(transcript.includes("nox")){

light.style.display="none"

}

}

</script>
