<!DOCTYPE html>

<html>
<head>

<title>The Marauder's Map</title>

<style>

body{
margin:0;
background:#e6d3a3;
font-family:Georgia, serif;
overflow:hidden;
}

/* parchment */

#map{
width:100vw;
height:100vh;
background-image:url("https://www.transparenttextures.com/patterns/aged-paper.png");
position:relative;
}

/* map title */

#title{
position:absolute;
top:40px;
width:100%;
text-align:center;
font-size:48px;
color:#3a2a1a;
letter-spacing:3px;
}

/* corridors */

.path{
position:absolute;
background:#3a2a1a;
height:4px;
transform-origin:left;
animation:draw 2s forwards;
}

@keyframes draw{
from{width:0}
to{width:100%}
}

/* student labels */

.student{
position:absolute;
font-size:14px;
color:#3a2a1a;
font-weight:bold;
}

/* footprints */

.footprint{
position:absolute;
width:6px;
height:10px;
background:#3a2a1a;
border-radius:50%;
opacity:0;
animation:step 0.6s infinite alternate;
}

@keyframes step{
from{opacity:0.2}
to{opacity:1}
}

</style>

</head>

<body>

<div id="map">

<div id="title">
I solemnly swear that I am up to no good
</div>

</div>

<script>

const map = document.getElementById("map")

/* MAP PATHS */

function path(x,y,length,angle){

let p=document.createElement("div")
p.className="path"

p.style.left=x+"px"
p.style.top=y+"px"
p.style.width=length+"px"
p.style.transform="rotate("+angle+"deg)"

map.appendChild(p)

}

path(200,300,600,0)
path(200,300,300,90)
path(800,300,300,90)
path(200,600,600,0)

/* STUDENTS */

const students=[
{name:"Harry",x:250,y:320},
{name:"Hermione",x:400,y:620},
{name:"Ron",x:900,y:320},
{name:"Draco",x:650,y:500}
]

students.forEach(s=>{

let el=document.createElement("div")

el.className="student"
el.innerText=s.name

el.style.left=s.x+"px"
el.style.top=s.y+"px"

map.appendChild(el)

move(el)

})

/* STUDENT MOVEMENT */

function move(el){

setInterval(()=>{

let x=Math.random()*1200+100
let y=Math.random()*600+200

el.style.left=x+"px"
el.style.top=y+"px"

footprints(x,y)

},5000)

}

/* FOOTPRINTS */

function footprints(x,y){

for(let i=0;i<5;i++){

let f=document.createElement("div")

f.className="footprint"

f.style.left=(x+i*6)+"px"
f.style.top=(y+i*6)+"px"

map.appendChild(f)

setTimeout(()=>f.remove(),2000)

}

}

</script>

</body>
</html>
